name: Feature Request
description: Propose a new feature or enhancement
labels: ["type: feature", "triage: needs review"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backend (FastAPI, database, API)
        - Frontend (React, TerriaJS, admin dashboard)
        - Infrastructure (AWS, Terraform, Docker, CI/CD)
        - ML (models, training, inference)
        - GeoServer (WMTS, WMS, tiles)
        - Documentation
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve? Why is it needed?
      placeholder: "As a [role], I need [capability] because [reason]..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work? Include API contracts, UI mockups, or architecture notes if relevant.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: How will we know this is done?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
        - [ ] Criterion 3
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider?
    validations:
      required: false
