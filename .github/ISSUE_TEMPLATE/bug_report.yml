name: Bug Report
description: Report a bug or unexpected behavior
labels: ["type: bug", "triage: needs review"]
body:
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - P0 - Critical (production down, data loss, security breach)
        - P1 - High (major feature broken, no workaround)
        - P2 - Medium (feature partially broken, workaround exists)
        - P3 - Low (cosmetic, minor inconvenience)
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backend (FastAPI, database, API)
        - Frontend (React, TerriaJS, admin dashboard)
        - Infrastructure (AWS, Terraform, Docker, CI/CD)
        - ML (models, training, inference)
        - GeoServer (WMTS, WMS, tiles)
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Where did you observe this?
      placeholder: "e.g., staging, production, local dev, branch name"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: |
        **What happened:**

        **What I expected:**
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste relevant logs, error messages, or attach screenshots
    validations:
      required: false
